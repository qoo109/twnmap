name: 資料更正回報
description: 回報政治人物、黨籍、職務、照片、來源或人物合併問題
title: "[資料更正] "
labels: ["data-correction"]
body:
  - type: markdown
    attributes:
      value: 感謝協助改善資料品質。請勿填寫身分證字號、住址等非公開個資。
  - type: input
    id: person
    attributes:
      label: 人物／地區／資料頁
      placeholder: 例如：某某人、臺中市，或貼上網址
    validations:
      required: true
  - type: dropdown
    id: issue
    attributes:
      label: 問題類型
      options:
        - 黨籍或推薦政黨錯誤
        - 職務／任職狀態錯誤
        - 照片錯誤或失效
        - 同名人物誤合併
        - 官方來源失效
        - 其他
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 問題說明
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: 可查證來源網址
      placeholder: 請優先提供官方來源
