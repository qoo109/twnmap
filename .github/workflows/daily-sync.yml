name: Daily official data sync
run-name: ${{ github.event_name == 'workflow_dispatch' && 'Manual official data sync' || 'Daily official data sync' }}

on:
  schedule:
    # GitHub cron uses UTC. 19:00 UTC = 03:00 the next day in Asia/Taipei.
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this workflow was triggered"
        required: false
        default: "manual-refresh"
      officeholder_scope:
        description: "現任公職範圍；full 會抓取議員、首長、代表、原住民區與村里長全部頁面"
        required: true
        default: "full"
        type: choice
        options: [full, standard]
      history_scope:
        description: "歷屆資料範圍；排程執行時固定為 none，手動完整更新可選 all"
        required: true
        default: "all"
        type: choice
        options: [none, core, local, all]
      history_years:
        description: "西元年度，以逗號分隔；輸入 all 會解析全部可辨識年份"
        required: false
        default: "all"

permissions:
  contents: write

concurrency:
  group: election-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project metadata
        run: npm ci --ignore-scripts
      - name: Verify MOI local-office parser fixture
        run: npm run test:moi-parser
      - name: Install image tools
        run: python -m pip install --disable-pip-version-check pillow
      - name: Preserve previous public data
        run: cp data/election-data.json /tmp/election-data-before.json
      - name: Sync current official data
        env:
          OFFICEHOLDER_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.officeholder_scope || 'full' }}
          MOI_REQUEST_DELAY_MS: "180"
          MOI_FETCH_RETRIES: "3"
          MOI_PAGE_CONCURRENCY: "3"
          MOI_HARD_PAGE_CAP: "600"
        run: npm run sync
      - name: Show MOI local-office diagnostics
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -f data/reports/moi-parser-diagnostics.json ]; then
            node -e 'const d=require("./data/reports/moi-parser-diagnostics.json"); for (const x of d.diagnostics||[]) console.log(`${x.name}: ${x.count} records, ${x.pagesFetched||0}/${x.pagesPlanned||0} pages, page size ${x.selectedPageSize||"?"}`)'
          else
            echo "No MOI diagnostics file was generated."
          fi
      - name: Upload MOI parser diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: moi-parser-diagnostics
          path: data/reports/moi-parser-diagnostics.json
          if-no-files-found: ignore
          retention-days: 7
      - name: Sync official CEC history when requested
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.history_scope != 'none' }}
        env:
          CEC_HISTORY_SCOPE: ${{ inputs.history_scope }}
          CEC_HISTORY_YEARS: ${{ inputs.history_years }}
          CEC_HISTORY_REFRESH: "1"
        run: npm run sync:history:official
      - name: Localize official portraits
        run: npm run cache:portraits
      - name: Build history indexes
        run: npm run sync:history
      - name: Generate change report and guard mass deletion
        env:
          BEFORE_DATA_PATH: /tmp/election-data-before.json
          CHANGE_GUARD: "1"
        run: npm run report:changes
      - name: Build county and person shards
        run: npm run build:shards
      - name: Build browser data
        run: npm run build:data
      - name: Validate generated files
        run: npm run validate
      - name: Commit changed data
        shell: bash
        run: |
          git config user.name "election-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data assets/portraits/cache
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: official sync $(TZ=Asia/Taipei date +%F)"
          git push
