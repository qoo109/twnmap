name: Daily official data sync
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual official data sync · {0}', inputs.officeholder_batch) || 'Scheduled official data sync' }}

on:
  schedule:
    # UTC → Asia/Taipei: 03:00 core, 03:40 representatives, 04:20 village chiefs.
    - cron: "0 19 * * *"
    - cron: "40 19 * * *"
    - cron: "20 20 * * *"
  workflow_dispatch:
    inputs:
      officeholder_batch:
        description: "現任公職批次；all 建議只在測試時使用，日常排程會自動分三批"
        required: true
        default: "core"
        type: choice
        options: [core, representatives, village, all]
      history_scope:
        description: "歷屆資料範圍；現任同步測試請選 none"
        required: true
        default: "none"
        type: choice
        options: [none, core, local, all]
      history_years:
        description: "西元年度，以逗號分隔；輸入 all 會解析全部可辨識年份"
        required: false
        default: "all"

permissions:
  contents: write

concurrency:
  group: election-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project metadata
        run: npm ci --ignore-scripts
      - name: Resolve scheduled batch
        shell: bash
        env:
          MANUAL_BATCH: ${{ inputs.officeholder_batch }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BATCH="${MANUAL_BATCH:-core}"
          elif [ "$EVENT_SCHEDULE" = "0 19 * * *" ]; then
            BATCH="core"
          elif [ "$EVENT_SCHEDULE" = "40 19 * * *" ]; then
            BATCH="representatives"
          else
            BATCH="village"
          fi
          case "$BATCH" in
            core)
              FILTER="president,vice-president,legislator,municipal-mayor,county-mayor,municipal-councilor,county-councilor,township-mayor,indigenous-district-mayor"
              ;;
            representatives)
              FILTER="township-representative,indigenous-district-representative"
              ;;
            village)
              FILTER="village-chief"
              ;;
            all)
              FILTER=""
              ;;
            *)
              echo "Unknown batch: $BATCH" >&2
              exit 1
              ;;
          esac
          echo "OFFICEHOLDER_BATCH=$BATCH" >> "$GITHUB_ENV"
          echo "OFFICEHOLDER_ROLE_FILTER=$FILTER" >> "$GITHUB_ENV"
          echo "Resolved batch: $BATCH"
          echo "Role filter: ${FILTER:-all}"
      - name: Verify MOI local-office parser fixture
        run: npm run test:moi-parser
      - name: Preserve previous public data
        run: cp data/election-data.json /tmp/election-data-before.json
      - name: Sync current official data
        env:
          OFFICEHOLDER_SCOPE: "full"
          OFFICEHOLDER_ROLE_FILTER: ${{ env.OFFICEHOLDER_ROLE_FILTER }}
          MOI_DATASET_MODE: "skip"
          MOI_FAST_PROBE: "1"
          MOI_REQUEST_DELAY_MS: "80"
          MOI_FETCH_RETRIES: "2"
          MOI_PAGE_CONCURRENCY: "5"
          MOI_HARD_PAGE_CAP: "600"
        run: npm run sync
      - name: Show MOI local-office diagnostics
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -f data/reports/moi-parser-diagnostics.json ]; then
            node -e 'const d=require("./data/reports/moi-parser-diagnostics.json"); for (const x of d.diagnostics||[]) console.log(`${x.name}: ${x.count} records, ${x.pagesFetched||0}/${x.pagesPlanned||0} pages`)'
          else
            echo "No MOI diagnostics file was generated."
          fi
      - name: Upload MOI parser diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: moi-parser-diagnostics-${{ env.OFFICEHOLDER_BATCH }}
          path: data/reports/moi-parser-diagnostics.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Sync official CEC history when requested
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.history_scope != 'none' }}
        env:
          CEC_HISTORY_SCOPE: ${{ inputs.history_scope }}
          CEC_HISTORY_YEARS: ${{ inputs.history_years }}
          CEC_HISTORY_REFRESH: "1"
        run: npm run sync:history:official
      - name: Build history indexes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.history_scope != 'none' }}
        run: npm run sync:history
      - name: Generate change report and guard mass deletion
        env:
          BEFORE_DATA_PATH: /tmp/election-data-before.json
          CHANGE_GUARD: "1"
        run: npm run report:changes
      - name: Build optimized county and person shards
        run: npm run build:shards
      - name: Build browser data
        run: npm run build:data
      - name: Validate generated files
        run: npm run validate
      - name: Upload current-data backup
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: current-data-backup-${{ env.OFFICEHOLDER_BATCH }}-${{ github.run_number }}
          path: |
            data/election-data.json
            data/officeholder-sync-status.json
            data/sync-status.json
            data/change-log/latest.json
            data/reports/moi-parser-diagnostics.json
          if-no-files-found: warn
          retention-days: 14
      - name: Commit changed data
        shell: bash
        run: |
          git config user.name "election-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: official ${OFFICEHOLDER_BATCH} sync $(TZ=Asia/Taipei date +%F)"
          git push
